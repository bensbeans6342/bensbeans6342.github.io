<!DOCTYPE html>

    <style>
        /* General Layout */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: #2c3e50;
            color: white;
            width: 100%;
            padding: 2rem 0;
            text-align: center;
        }

        main {
            max-width: 900px;

        }

        .card {
            background: white;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            display: inline-block;
            padding-bottom: 5px;
            margin-top: 0;
        }

        /* Table Container for side-by-side layout */
        .table-container {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            flex-wrap: wrap;
        }

        table {
            flex: 1;
            min-width: 300px;
            border-collapse: collapse;
            margin-top: 10px;
        }

        td, th {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
