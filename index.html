<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bensbeans's blog</title>
    <style>
        /* General Layout */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background: #2c3e50;
            color: white;
            width: 100%;
            padding: 2rem 0;
            text-align: center;
        }

        main {
            max-width: 800px;
            width: 90%;
            margin: 2rem 0;
        }

        .card {
            background: white;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            display: inline-block;
            padding-bottom: 5px;
            margin-top: 0;
        }

        /* Instagram Horizontal Scroller */
        .instagram-scroller {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 10px 0;
            scrollbar-width: thin;
        }

        .instagram-scroller::-webkit-scrollbar {
            height: 8px;
        }

        .instagram-scroller::-webkit-scrollbar-thumb {
            background-color: #ccc;
            border-radius: 4px;
        }

        /* Force posts to stay a fixed width for scrolling */
        .instagram-scroller blockquote {
            flex: 0 0 320px; 
            margin: 0 !important;
        }

        footer {
            font-size: 0.9rem;
            color: #777;
            margin-top: auto;
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>bensbeans's blog</h1>
</header>

<main>
    <!-- Featured Instagram Posts -->
    <div class="card">
        <h2>Featured Instagrams</h2>
        <div class="instagram-scroller">
            <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DaN8nF_iWwJ/?utm_source=ig_web_copy_link&igsh=NTc4MTIwNjQ2YQ==" data-instgrm-version="14"><a href="https://www.instagram.com/p/DaN8nF_iWwJ/"></a></blockquote>
            
            <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/Da6WMvvDKQb/?utm_source=ig_web_copy_link&igsh=NTc4MTIwNjQ2YQ==" data-instgrm-version="14"><a href="https://www.instagram.com/p/Da6WMvvDKQb/"></a></blockquote>
            
            <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/Da7o0NQkbEN/?utm_source=ig_web_copy_link&igsh=NTc4MTIwNjQ2YQ==" data-instgrm-version="14"><a href="https://www.instagram.com/reel/Da7o0NQkbEN/"></a></blockquote>
        </div>
        <script async src="//www.instagram.com/embed.js"></script>
    </div>
</main>

<footer>
    <p>bensbeans's blog &copy; 2026</p>
</footer>

</body>
</html>
